# Text-Span JEPA defaults
# All configs inherit from these values — override in per-experiment YAML files
# Structure follows NextLat (Microsoft Research, 2025)

seed: 42

meta:
  use_bfloat16: true
  load_checkpoint: false
  read_checkpoint: null
  model_name: text_span_jepa

data:
  batch_size: 64
  max_seq_len: 512
  tokenizer: gpt2
  num_workers: 2
  root_path: data/wikitext-103
  mask_ratio: 0.35
  span_length_range: [3, 10]

model:
  embed_dim: 768
  encoder_depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  qkv_bias: true
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.1
  predictor_embed_dim: 384
  predictor_depth: 6
  future_offsets: [1, 4, 16]
  num_refine_steps: 3
  refine_step_size: 0.1
  decoder_bias: false
  variance_margin: 1.0
  centering_momentum: 0.9
  ema_tau_start: 0.996
  ema_tau_end: 1.0
  lambda_span: 1.0
  lambda_future: 0.5
  lambda_decoder: 0.1
  lambda_variance: 0.1
  lambda_covariance: 0.04
  mask_ratio_start: 0.15
  mask_ratio_end: 0.35
  future_warmup_steps: 5000

optimization:
  ema: [0.996, 1.0]
  epochs: 50
  ipe_scale: 1.0
  lr: 0.001
  start_lr: 0.0002
  final_lr: 1.0e-5
  warmup: 10
  weight_decay: 0.04
  final_weight_decay: 0.4

logging:
  folder: output/
  log_freq: 10
  write_tag: text_span_jepa
